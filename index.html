<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tayta Inti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ===== FUENTES ===== */
    @font-face {
      font-family: 'Adelia';
      src: url('fuentes/Adelia.otf') format('opentype');
    }
    @font-face {
      font-family: 'Scriptorial';
      src: url('fuentes/Scriptorial.ttf') format('truetype');
    }
    @font-face {
      font-family: 'TheRustic';
      src: url('fuentes/TheRustic-Demo.otf') format('opentype');
    }

    /* ===== RESET ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background-color: #000;
    }

    /* ===== CARRUSEL ===== */
    #carrusel {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .fondo-carrusel {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .fondo-activo {
      opacity: 1;
    }

    /* ===== CONTENEDOR ===== */
    .contenedor {
      position: relative;
      width: 100%;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* ===== ICONOS IZQUIERDA ===== */
    .iconos-izquierda {
      position: absolute;
      top: 20px;
      left: 40px;
      display: flex;
      gap: 18px; /* MÁS JUNTOS */
      z-index: 9999;
    }

    .iconos-izquierda img {
      width: 60px;   /* MÁS GRANDES */
      height: 60px;
      object-fit: contain;
      cursor: pointer;
      filter: brightness(0) invert(1);
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .iconos-izquierda img:hover {
      transform: scale(1.18);
      filter: brightness(1.5);
    }

    /* ===== ICONOS DERECHA ===== */
    .iconos-derecha {
      position: absolute;
      top: 20px;
      right: 40px;
      display: flex;
      gap: 25px;
      z-index: 9999;
    }

    .iconos-derecha img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      cursor: pointer;
      filter: brightness(0) invert(1);
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .iconos-derecha img:hover {
      transform: scale(1.15);
      filter: brightness(1.5);
    }

    /* ===== LOGO ===== */
    .logo2 {
      width: 250px;
      max-width: 70%;
      margin-bottom: 60px;
    }

    /* ===== BOTONES ===== */
    .botones {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .boton-cuadrado {
      width: 220px;
      height: 80px;
      border: 2px solid #fff;
      color: #fff;
      font-family: 'TheRustic', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .boton-cuadrado:hover {
      background: #fff;
      color: #000;
      transform: scale(1.05);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .iconos-izquierda {
        left: 20px;
        gap: 14px;
      }

      .iconos-izquierda img {
        width: 50px;
        height: 50px;
      }

      .iconos-derecha {
        right: 20px;
        gap: 15px;
      }

      .iconos-derecha img {
        width: 35px;
        height: 35px;
      }

      .logo2 {
        width: 160px;
        margin-bottom: 40px;
      }

      .boton-cuadrado {
        width: 80%;
        max-width: 250px;
      }
    }
  </style>
</head>
<body>

  <!-- CARRUSEL -->
  <div id="carrusel"></div>

  <!-- ICONOS IZQUIERDA -->
  <div class="iconos-izquierda">
    <a href="https://facebook.com" target="_blank">
      <img src="imagenes/facebook.png" alt="Facebook">
    </a>
    <a href="https://www.instagram.com/taytainti.com.pe?igsh=MTkxOXJibXl1NXMyaQ==" target="_blank">
      <img src="imagenes/instagram.png" alt="Instagram">
    </a>
    <a href="https://wa.me/51956627852" target="_blank">
      <img src="imagenes/whatssap.png" alt="WhatsApp">
    </a>
  </div>

  <!-- ICONOS DERECHA -->
  <div class="iconos-derecha">
    <a href="index.html">
      <img src="imagenes/home.jpg" alt="Home">
    </a>
    <a href="formulario.html">
      <img src="imagenes/carrito.png" alt="Carrito">
    </a>
  </div>

  <!-- CONTENIDO -->
  <div class="contenedor">
    <img src="imagenes/logo2.png" alt="Logo Tayta Inti" class="logo2">

    <div class="botones">
      <a href="shop.html" class="boton-cuadrado">EXTRACTS</a>
      <a href="shop2.html" class="boton-cuadrado">OILS & BALSAMS</a>
      <a href="shop3.html" class="boton-cuadrado">POWDERS</a>
      <a href="shop4.html" class="boton-cuadrado">DRIED HERBS</a>
    </div>
  </div>

  <script>
    const imagenes = [
      'imagenes/fondo400.jpg',
      'imagenes/fondo1000.jpg',
      'imagenes/fondo2000.jpg',
      'imagenes/fondo3000.jpg',
      'imagenes/fondo4000.jpg'
    ];

    const carrusel = document.getElementById('carrusel');
    let indice = 0;

    imagenes.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'fondo-carrusel' + (i === 0 ? ' fondo-activo' : '');
      div.style.backgroundImage = `url('${img}')`;
      carrusel.appendChild(div);
    });

    const fondos = document.querySelectorAll('.fondo-carrusel');

    setInterval(() => {
      fondos[indice].classList.remove('fondo-activo');
      indice = (indice + 1) % fondos.length;
      fondos[indice].classList.add('fondo-activo');
    }, 5000);
  </script>

</body>
</html>
